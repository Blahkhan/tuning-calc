<!doctype html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Deutsche Style Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-crop">
                    <img class="brand-logo" src="logo.png" alt="Deutsche Style Studio">
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="layout-wrapper">
            <!-- Left Column - Parts -->
            <main class="main-content">
                <div id="partsContainer" class="parts-grid"></div>
            </main>

            <!-- Right Column - Sidebar -->
            <aside class="sidebar">
                <!-- Vehicle + Tuner Card -->
                <div class="card">
                    <h3>Parametry Pojazdu i Dane Tunera</h3>
                    <div class="form-group">
                        <label for="carName">Nazwa auta:</label>
                        <input type="text" id="carName" class="text-input" placeholder="np. Issi Sport">
                    </div>
                    <div class="form-group">
                        <label for="carUid">UID pojazdu:</label>
                        <input type="text" id="carUid" class="text-input" placeholder="np. UID-23901">
                    </div>
                    <div class="form-group">
                        <label for="licensePlate">Tablica rejestracyjna:</label>
                        <input type="text" id="licensePlate" class="text-input" placeholder="np. LS 1234">
                    </div>
                    <div class="form-group">
                        <label for="carPrice">Wartość auta:</label>
                        <div class="input-wrapper">
                            <input type="number" id="carPrice" value="20000" min="0" step="1000">
                            <span class="currency">$</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tunerName">Imię i nazwisko:</label>
                        <input type="text" id="tunerName" class="text-input" placeholder="np. Jan Kowalski">
                    </div>
                </div>

                <!-- Robocizna Card -->
                <div class="card">
                    <h3>Koszty Dodatkowe</h3>
                    <div class="form-group">
                        <label for="robocizna">Robocizna:</label>
                        <div class="input-wrapper">
                            <input type="number" id="robocizna" value="0" min="0" step="100">
                            <span class="currency">$</span>
                        </div>
                    </div>
                </div>

                <!-- Summary Card -->
                <div class="card summary">
                    <h3>Podsumowanie</h3>
                    <div class="summary-item">
                        <span>Części:</span>
                        <span id="partsCost">$0.00</span>
                    </div>
                    <div class="summary-item">
                        <span>Robocizna:</span>
                        <span id="laborCost">$0.00</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-total">
                        <span>Razem:</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button id="exportPdfBtn" class="btn-export-pdf">📄 Eksportuj PDF</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
